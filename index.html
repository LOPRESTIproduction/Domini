<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bityours.com | Green&Gain Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        body { 
            background-color: #020617;
            /* APPLICA LO SFONDO A TUTTO IL SITO */
            background-image: 
                linear-gradient(to bottom, rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.98)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); /* Texture tecnica di fallback */
            background-attachment: fixed;
            color: #ffffff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass { 
            background: rgba(30, 41, 59, 0.5); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px; 
        }

        /* LOGO FINALE LOPRESTI PRODUCTION RIMPICCIOLITO */
        .footer-logo {
            width: 180px; 
            height: auto;
            margin-top: 50px;
            margin-bottom: 50px;
            filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.3));
        }

        /* SFUMATURA FINALE DELLO SFONDO */
        .footer-fade {
            width: 100%;
            height: 150px;
            background: linear-gradient(to top, #020617, transparent);
            margin-top: -100px;
        }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md w-full space-y-6 pb-10">
        
        <div class="text-center pt-6">
            <h1 class="text-5xl font-extrabold italic uppercase tracking-tighter text-white">BITYOURS<span class="text-green-500">.COM</span></h1>
            <p class="text-green-500 text-[10px] font-black tracking-[0.4em] uppercase">Green&Gain Portfolio</p>
        </div>

        <div class="glass p-8 text-center border-b-2 border-green-500">
            <span class="text-[10px] text-slate-400 uppercase font-black tracking-widest">Capitale Investito (Live)</span>
            <div id="live-balance" class="text-5xl font-extrabold mt-1 italic tracking-tighter text-white">€ 787,51</div>
        </div>

        <div class="glass overflow-hidden">
            <div class="bg-white/5 px-6 py-4 border-b border-white/10 flex justify-between items-center">
                <span class="text-[10px] font-black uppercase tracking-widest text-green-500 italic">Market View</span>
                <div class="flex items-center gap-2 text-[9px] text-slate-500 font-bold">
                    <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                    <span>SYNC LIVE</span>
                </div>
            </div>
            <div class="p-4">
                <table class="w-full text-[11px] font-bold">
                    <tbody id="ticker-body">
                        </tbody>
                </table>
            </div>
        </div>

        <footer class="flex flex-col items-center">
            <img src="logo.png" alt="Lopresti Production" class="footer-logo" onerror="this.src='https://via.placeholder.com/180x100/020617/fbbf24?text=LOPRESTI+PRODUCTION'">
        </footer>
    </div>
</body>
</html>
