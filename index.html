<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BITYOURS.COM - Personal Portfolio</title>
    <style>
        :root {
            --bg-main: #0b0f15;
            --card-bg: #151c26;
            --accent-green: #2ecc71;
            --accent-orange: #f39c12;
            --text-white: #ffffff;
            --text-dim: #94a3b8;
            --border-color: #2d3748;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-white);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 15px; }

        /* PULSANTE ARANCIONE - ACCESSO ACCOUNT */
        .account-link {
            background: linear-gradient(135deg, #e67e22, #f39c12);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3);
            display: block;
        }
        .account-link span { display: block; font-size: 0.65rem; text-transform: uppercase; margin-bottom: 2px; opacity: 0.9; }

        /* Header */
        .header { text-align: center; padding: 10px 0; }
        .header h1 { font-size: 2.4rem; margin: 0; letter-spacing: 1px; }
        .header .subtitle { color: var(--accent-green); font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        /* Card Capitale */
        .capital-card {
            border: 2px solid var(--accent-green);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            background: rgba(21, 28, 38, 0.6);
        }
        .cap-amount { font-size: 3.2rem; font-weight: bold; margin: 5px 0; }

        /* Market View */
        .market-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 520px; /* Spazio per tutti i titoli + logo */
        }

        .market-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 10px; 
        }
        .market-title { color: var(--accent-green); font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }

        /* Righe Asset */
        .asset-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            z-index: 2; /* Sopra l'immagine */
        }
        .asset-name { font-weight: 500; font-size: 0.8rem; color: #e2e8f0; text-transform: uppercase; max-width: 65%; }
        .asset-val { text-align: right; font-weight: bold; font-size: 0.9rem; }
        .asset-chg { color: var(--accent-green); font-size: 0.7rem; display: block; }

        /* LOGO IN FONDO (Lievemente trasparente) */
        .footer-logo {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 75%;
            opacity: 0.15; /* Trasparenza lieve (15% visibile) */
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
