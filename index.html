<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BITYOURS.COM - Green&Gain Portfolio</title>
    <style>
        :root {
            --bg-main: #0b0f15;
            --card-bg: #151c26;
            --accent-green: #2ecc71;
            --text-white: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        /* Header Titolo */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .header .subtitle {
            color: var(--accent-green);
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Card Capitale */
        .capital-card {
            border: 1px solid var(--accent-green);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            background: rgba(21, 28, 38, 0.4);
        }
        .cap-label {
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .cap-amount {
            font-size: 3rem;
            font-weight: bold;
            margin-top: 8px;
        }

        /* Market View Card */
        .market-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            min-height: 420px;
            position: relative; /* Per posizionare il logo in fondo */
            display: flex;
            flex-direction: column;
        }

        .market-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .market-title {
            color: var(--accent-green);
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .sync-status {
            color: var(--accent-green);
            font-size: 0.7rem;
            display: flex;
            align-items: center;
        }
        .dot {
            height: 6px;
            width: 6px;
            background-color: var(--accent-green);
            border-radius: 50%;
            margin-right: 6px;
        }

        /* Righe Titoli (Asset Rows) */
        .asset-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid #2d3748;
            position: relative;
            z-index: 2; /* Sopra il logo */
        }

        .asset-name { font-weight: bold; font-size: 1rem; }
        .asset-target { color: var(--text-dim); font-size: 0.75rem; margin-top: 2px; }
        
        .asset-values { text-align: right; }
        .val-eur { font-weight: bold; font-size: 1rem; }
        .val-perc { color: var(--accent-green); font-size: 0.75rem; display: block; }

        /* LOGO IN FONDO (LOPRESTI Production) */
        .footer-logo {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 75%;
            opacity: 0.15; /* Trasparenza 15% come richiesto */
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>BITYOURS.COM</h1>
            <div class="subtitle">GREEN&GAIN PORTFOLIO</div>
        </div>

        <div class="capital-card">
            <div class="cap-label">Capitale Investito (Live)</div>
            <div class="cap-amount">€ 788,30</div>
        </div>

        <div class="market-card">
            <div class="market-header">
                <div class="market-title">Market View</div>
                <div class="sync-status"><span class="dot"></span> SYNC LIVE</div>
            </div>

            <div class="asset-row">
                <div>
                    <div class="asset-name">Growth (India/Tech)</div>
                    <div class="asset-target">Target 55%</div>
                </div>
                <div class="asset-values">
                    <div class="val-eur">€ 433,56</div>
                    <div class="val-perc">+1.2%</div>
                </div>
            </div>

            <div class="asset-row">
                <div>
                    <div class="asset-name">Defense (Bonds)</div>
                    <div class="asset-target">Target 30%</div>
                </div>
                <div class="asset-values">
                    <div class="val-eur">€ 236,49</div>
                    <div class="val-perc">+0.4%</div>
                </div>
            </div>

            <div class="asset-row">
                <div>
                    <div class="asset-name">Dividend (High Div)</div>
                    <div class="asset-target">Target 15%</div>
                </div>
                <div class="asset-values">
                    <div class="val-eur">€ 118,25</div>
                    <div class="val-perc">+0.8%</div>
                </div>
            </div>

            <img src="IMG_20260307_171548.png" class="footer-logo" alt="LOPRESTI Production">
        </div>
    </div>

</body>
</html>
