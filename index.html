        <!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green&Gain Portfolio - LOPRESTI Production</title>
    <style>
        :root {
            --bg-color: #0a0e14;
            --card-bg: #151c26;
            --accent-green: #2ecc71;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .header span {
            color: var(--accent-green);
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* Card Capitale */
        .card-main {
            background: linear-gradient(145deg, #1a232e, #151c26);
            border: 1px solid var(--accent-green);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 25px;
        }
        .label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; }
        .amount { font-size: 2.5rem; font-weight: bold; margin-top: 10px; }

        /* Market View Section */
        .market-view {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            overflow: hidden; /* Importante per contenere il logo */
            min-height: 300px;
        }

        .market-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .sync-status { color: var(--accent-green); font-size: 0.7rem; display: flex; align-items: center; }
        .dot { height: 6px; width: 6px; background-color: var(--accent-green); border-radius: 50%; margin-right: 5px; }

        /* Lista Titoli */
        .asset-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #2d3748;
            position: relative;
            z-index: 2; /* Porta i titoli sopra il logo */
        }
        .asset-info div { font-weight: bold; }
        .asset-info span { font-size: 0.75rem; color: var(--text-dim); }
        .asset-val { text-align: right; font-weight: bold; }
        .change { color: var(--accent-green); font-size: 0.75rem; }

        /* LOGO IN TRASPARENZA (LOPRESTI Production) */
        .background-logo {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            opacity: 0.15; /* Regola qui la trasparenza (0.1 = 10%, 1.0 = 100%) */
            pointer-events: none; /* Impedisce al logo di interferire con i click */
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>BITYOURS.COM</h1>
            <span>GREEN&GAIN PORTFOLIO</span>
        </div>

        <div class="card-main">
            <div class="label">Capitale Investito (Live)</div>
            <div class="amount">€ 788,30</div>
        </div>

        <div class="market-view">
            <div class="market-header">
                <div class="label" style="color: var(--accent-green)">Market View</div>
                <div class="sync-status"><span class="dot"></span> SYNC LIVE</div>
            </div>

            <div class="asset-row">
                <div class="asset-info">
                    <div>Growth (India/Tech)</div>
                    <span>Target 55%</span>
                </div>
                <div class="asset-val">
                    € 433,56
                    <div class="change">+1.2%</div>
                </div>
            </div>

            <div class="asset-row">
                <div class="asset-info">
                    <div>Defense (Bonds)</div>
                    <span>Target 30%</span>
                </div>
                <div class="asset-val">
                    € 236,49
                    <div class="change">+0.4%</div>
                </div>
            </div>

            <div class="asset-row">
                <div class="asset-info">
                    <div>Dividend (High Div)</div>
                    <span>Target 15%</span>
                </div>
                <div class="asset-val">
                    € 118,25
                    <div class="change">+0.8%</div>
                </div>
            </div>

            <img src="URL_TUA_IMMAGINE_LOGO.png" alt="LOPRESTI Production" class="background-logo">
        </div>
    </div>

</body>
                    </html>
